[Distribution]
Distribution=ubuntu
Release=noble
Architecture=x86-64

[Output]
Format=disk
ImageId=holosteric-base
OutputDirectory=output/images/base

[Content]
Packages=
    ca-certificates
    cloud-init
    curl
    jq
    openssh-server
    qemu-guest-agent

ExtraTrees=
    scripts/guest/:/opt/holosteric/

PostInstallationScripts=scripts/setup-base.sh

[Repositories]
Repositories=
    deb http://archive.ubuntu.com/ubuntu noble main universe
    deb http://archive.ubuntu.com/ubuntu noble-updates main universe
    deb http://security.ubuntu.com/ubuntu noble-security main universe
