name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: vet + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: go test (unit)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.out
          if-no-files-found: ignore

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      # The integration harness builds mock qemu binaries and invokes the
      # real holos CLI; it does not require a KVM host. We install
      # genisoimage only so an alternate cloud-init builder is available if
      # something ever removes the bundled mock.
      - name: Install cloud-init media tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends genisoimage

      - name: go test (integration)
        run: go test -tags integration -v -timeout 120s ./test/integration/...

      - name: smoke test - release binary boots
        run: |
          go build -o bin/holos ./cmd/holos
          ./bin/holos images
          ./bin/holos ps

  cross-build:
    name: cross-platform build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: go build
        run: go build -o holos ./cmd/holos

      - name: go test
        run: go test ./...
